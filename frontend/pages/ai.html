<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Celso POS | Os AI</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235a9e6f'/%3E%3Ctext x='16' y='23' font-family='sans-serif' font-size='20' font-weight='700' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E">
  <script src="../assets/vendor/icons.js?v=25"></script>

  <link rel="stylesheet" href="../css/main.css?v=25">
  <link rel="stylesheet" href="../css/layout.css?v=25">
  <link rel="stylesheet" href="../css/components.css?v=25">
  <link rel="stylesheet" href="../css/pages/ai.css?v=25">
  <link rel="stylesheet" href="../css/onboarding.css?v=25">
  <script src="../js/core/lite-mode.js?v=25"></script>
</head>
<body class="app-body">

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="sidebar-header">
        <div class="sidebar-logo-box">
          <i data-lucide="leaf"></i>
        </div>
        <span class="sidebar-app-name nav-link-text">Celso POS</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link" data-page="dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span class="nav-link-text">Dashboard</span>
        </a>
        <a href="order.html" class="nav-link" data-page="order">
          <i data-lucide="shopping-cart"></i>
          <span class="nav-link-text">New Order</span>
        </a>
        <a href="inventory.html" class="nav-link" data-page="inventory">
          <i data-lucide="archive"></i>
          <span class="nav-link-text">Inventory</span>
        </a>
        <a href="products.html" class="nav-link" data-page="products">
          <i data-lucide="package"></i>
          <span class="nav-link-text">Products</span>
        </a>
        <a href="finance.html" class="nav-link" data-page="finance">
          <i data-lucide="wallet"></i>
          <span class="nav-link-text">Finance</span>
        </a>
        <a href="analytics.html" class="nav-link" data-page="analytics">
          <i data-lucide="bar-chart-2"></i>
          <span class="nav-link-text">Analytics</span>
        </a>
        <a href="history.html" class="nav-link" data-page="history">
          <i data-lucide="clock"></i>
          <span class="nav-link-text">History</span>
        </a>
      </nav>

      <div class="sidebar-user-area">

        <div class="user-popup" id="user-popup">
          <a href="account.html" class="user-popup-item">
            <i data-lucide="user"></i>
            Account Settings
          </a>
          <button
            type="button"
            class="user-popup-item logout-item"
            id="logout-button"
          >
            <i data-lucide="log-out"></i>
            Logout
          </button>
        </div>

        <div class="sidebar-user-card" id="user-menu-trigger">
          <div class="user-avatar" id="user-avatar">--</div>
          <div class="user-info">
            <p class="user-name" id="user-name">User</p>
            <p class="user-role">Cashier</p>
          </div>
        </div>

      </div>
    </aside>

    <div class="main-content">

      <!-- Topbar -->
      <header class="topbar">
        <h1>Os AI</h1>

        <div class="topbar-actions">
          <button
            type="button"
            class="topbar-icon-button"
            id="theme-toggle"
            title="Toggle theme"
          >
            <i data-lucide="moon" id="theme-icon"></i>
          </button>
        </div>
      </header>

      <main class="page-body">

        <!-- Os Chat Container -->
        <div class="os-chat-container" id="os-chat-container">

          <!-- Disabled state (when osEnabled = false) -->
          <div class="os-disabled-state" id="os-disabled-state">
            <div class="os-disabled-card">
              <div class="os-logo">Os</div>
              <h2>Os Business Advisor</h2>
              <p class="beta-badge">BETA</p>
              <p>Enable Os in Account Settings to start asking questions
                 about your store.</p>
              <a href="account.html" class="submit-button">
                Go to Account Settings
              </a>
            </div>
          </div>

          <!-- Chat state (when osEnabled = true) -->
          <div class="os-chat-state" id="os-chat-state" style="display:none;">

            <div class="os-messages" id="os-messages"></div>

            <!-- Suggestion chips -->
            <div class="os-suggestions" id="os-suggestions">
              <button class="os-chip" data-q="Kumusta negosyo ngayon?">
                Kumusta ngayon?
              </button>
              <button class="os-chip" data-q="Ano ang kailangan ko i-restock?">
                Kailangan i-restock?
              </button>
              <button class="os-chip" data-q="Magkano pa ang utang ko?">
                Magkano utang ko?
              </button>
              <button class="os-chip" data-q="Safe ba mag-kuha ngayon?">
                Safe ba mag-kuha?
              </button>
              <button class="os-chip" data-q="Ano best seller natin this month?">
                Best sellers?
              </button>
              <button class="os-chip" data-q="Kailan busiest ang tindahan?">
                Kailan busiest?
              </button>
            </div>

            <!-- Input area -->
            <div class="os-input-area">
              <textarea
                id="os-input"
                placeholder="Ask Os anything about your store..."
                rows="1"
              ></textarea>
              <button id="os-send" class="os-send-btn">Send</button>
            </div>

            <div class="os-footer">
              <button id="os-clear" class="os-clear-btn">Clear conversation</button>
              <span class="os-powered">Powered by Groq · llama-3.3-70b</span>
            </div>

          </div>
        </div>

      </main>
    </div>
  </div>

  <script>lucide.createIcons();</script>
  <script defer src="../js/components/sidebar.js?v=25"></script>
  <script defer src="../js/core/theme.js?v=26"></script>
  <script defer src="../js/core/api.js?v=25"></script>
  <script defer src="../js/components/billing.modal.js?v=25"></script>
  <script defer src="../js/components/locked.overlay.js?v=25"></script>
  <script defer src="../js/core/utils.js?v=25"></script>
  <script defer src="../js/core/auth.js?v=25"></script>
  <script defer src="../js/core/data.js?v=25"></script>
  <script defer src="../js/components/os.client.js?v=25"></script>
  <script defer src="../js/onboarding/onboarding.core.js?v=25"></script>
  <script defer src="../js/onboarding/onboarding.welcome.js?v=25"></script>
  <script defer src="../js/onboarding/onboarding.checklist.js?v=25"></script>
  <script defer src="../js/onboarding/onboarding.tours.js?v=25"></script>
  <script defer src="../js/onboarding/onboarding.tour.js?v=25"></script>
  <script defer src="../js/pages/ai.js?v=25"></script>
</body>
</html>
