<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Celso POS | Set a New Password</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235a9e6f'/%3E%3Ctext x='16' y='23' font-family='sans-serif' font-size='20' font-weight='700' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E">
  <script src="../../assets/vendor/icons.js?v=25"></script>

  <link rel="stylesheet" href="../../css/main.css?v=25">
  <script src="../../js/core/lite-mode.js?v=25"></script>
</head>
<body>

  <main class="page-wrapper">

    <section class="login-container">

      <div class="app-branding">
        <div class="logo-area">
          <i data-lucide="leaf"></i>
        </div>
        <p>Simple and reliable point-of-sale system</p>
      </div>

      <div class="login-card">
        <h2>Set a New Password</h2>
        <p class="login-subtitle">
          For your security, please choose a new password before continuing.
        </p>

        <form class="login-form" id="cp-form" novalidate>

          <div class="form-group">
            <label for="cp-new">New Password</label>
            <input type="password" id="cp-new" name="newPassword" placeholder="At least 12 characters" required />
            <div class="pw-meter" id="pw-meter" aria-hidden="true">
              <div class="pw-meter-track"><div class="pw-meter-fill"></div></div>
              <span class="pw-meter-label"></span>
            </div>
            <p class="pw-hint">Use at least 12 characters — a short phrase you'll remember works great.</p>
          </div>

          <div class="form-group">
            <label for="cp-confirm">Confirm New Password</label>
            <input type="password" id="cp-confirm" name="confirmPassword" placeholder="Re-enter your new password" required />
          </div>

          <p id="cp-error" class="form-error"></p>

          <button type="submit" class="submit-button" id="cp-btn">
            Save and continue
          </button>
        </form>
      </div>
    </section>

  </main>

  <script defer src="../../js/core/api.js?v=25"></script>
  <script defer src="../../js/core/utils.js?v=25"></script>
  <script defer src="../../js/core/password-policy.js?v=25"></script>
  <script defer src="../../js/core/auth.js?v=25"></script>
  <script defer src="../../js/pages/change-password.js?v=25"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
