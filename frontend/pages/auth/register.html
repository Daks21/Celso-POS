<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Celso POS | Register</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235a9e6f'/%3E%3Ctext x='16' y='23' font-family='sans-serif' font-size='20' font-weight='700' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E">
  <script src="../../assets/vendor/icons.js?v=22"></script>

  <link rel="stylesheet" href="../../css/main.css?v=22">
  <script src="../../js/core/lite-mode.js?v=22"></script>
</head>
<body>

  <main class="page-wrapper">

    <section class="login-container">

      <div class="app-branding">
        <div class="logo-area">
          <i data-lucide="leaf"></i>
        </div>
        <p>Simple and reliable point-of-sale system</p>
      </div>

      <div class="login-card">
        <h2>Registration Form</h2>

        <form class="login-form" id="register-form" novalidate>

          <div class="form-group">
            <label for="fullName">Full Name</label>
            <input
              type="text"
              id="fullName"
              name="fullName"
              placeholder="Enter your Full Name"
              required
            />
            <p id="fullName-error" class="form-error"></p>
          </div>

          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
            <p id="email-error" class="form-error"></p>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="At least 12 characters"
              required
            />
            <div class="pw-meter" id="pw-meter" aria-hidden="true">
              <div class="pw-meter-track"><div class="pw-meter-fill"></div></div>
              <span class="pw-meter-label"></span>
            </div>
            <p class="pw-hint">Use at least 12 characters — a short phrase you'll remember works great.</p>
            <p id="password-error" class="form-error"></p>
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Confirm your password"
              required
            />
            <p id="confirmPassword-error" class="form-error"></p>
          </div>

          <button type="submit" class="submit-button">
            Register
          </button>

          <p class="register-link">
            Already have an account?
            <a href="../../index.html">Login here!</a>
          </p>

        </form>
      </div>

    </section>
  </main>

  <script defer src="../../js/core/api.js?v=22"></script>
  <script defer src="../../js/core/utils.js?v=22"></script>
  <script defer src="../../js/core/password-policy.js?v=22"></script>
  <script defer src="../../js/core/auth.js?v=22"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
