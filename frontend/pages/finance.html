<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Celso POS | Finance</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235a9e6f'/%3E%3Ctext x='16' y='23' font-family='sans-serif' font-size='20' font-weight='700' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E">
  <script src="../assets/vendor/lucide.min.js?v=8"></script>

  <link rel="stylesheet" href="../css/main.css?v=8">
  <link rel="stylesheet" href="../css/layout.css?v=8">
  <link rel="stylesheet" href="../css/components.css?v=8">
  <link rel="stylesheet" href="../css/pages/finance.css?v=8">
  <link rel="stylesheet" href="../css/onboarding.css?v=8">
  <link rel="stylesheet" href="../css/os.widget.css?v=8">
</head>
<body class="app-body">

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="sidebar-header">
        <div class="sidebar-logo-box">
          <i data-lucide="leaf"></i>
        </div>
        <span class="sidebar-app-name nav-link-text">Celso POS</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link" data-page="dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span class="nav-link-text">Dashboard</span>
        </a>
        <a href="order.html" class="nav-link" data-page="order">
          <i data-lucide="shopping-cart"></i>
          <span class="nav-link-text">New Order</span>
        </a>
        <a href="inventory.html" class="nav-link" data-page="inventory">
          <i data-lucide="archive"></i>
          <span class="nav-link-text">Inventory</span>
        </a>
        <a href="products.html" class="nav-link" data-page="products">
          <i data-lucide="package"></i>
          <span class="nav-link-text">Products</span>
        </a>
        <a href="finance.html" class="nav-link" data-page="finance">
          <i data-lucide="wallet"></i>
          <span class="nav-link-text">Finance</span>
        </a>
        <a href="analytics.html" class="nav-link" data-page="analytics">
          <i data-lucide="bar-chart-2"></i>
          <span class="nav-link-text">Analytics</span>
        </a>
        <a href="history.html" class="nav-link" data-page="history">
          <i data-lucide="clock"></i>
          <span class="nav-link-text">History</span>
        </a>
      </nav>

      <div class="sidebar-user-area">

        <div class="user-popup" id="user-popup">
          <a href="account.html" class="user-popup-item">
            <i data-lucide="user"></i>
            Account Settings
          </a>
          <button
            type="button"
            class="user-popup-item logout-item"
            id="logout-button"
          >
            <i data-lucide="log-out"></i>
            Logout
          </button>
        </div>

        <div class="sidebar-user-card" id="user-menu-trigger">
          <div class="user-avatar" id="user-avatar">--</div>
          <div class="user-info">
            <p class="user-name" id="user-name">User</p>
            <p class="user-role">Cashier</p>
          </div>
        </div>

      </div>
    </aside>

    <div class="main-content">

      <!-- Topbar -->
      <header class="topbar">
        <h1 id="page-title">Finance</h1>

        <div class="topbar-actions">
          <button
            type="button"
            class="topbar-icon-button"
            id="theme-toggle"
            title="Toggle theme"
          >
            <i data-lucide="moon" id="theme-icon"></i>
          </button>
        </div>
      </header>

      <main class="page-body">

        <!-- Summary Cards -->
        <div class="finance-summary" id="finance-summary"></div>

        <section class="page-section">

          <div class="products-header">
            <div>
              <h2>Cash Flow</h2>
              <p>Track capital, expenses, and withdrawals</p>
            </div>
            <button type="button" class="submit-button" id="add-entry-button" style="display:none;width:auto;">
              + Add Entry
            </button>
          </div>

          <!-- Filters -->
          <div class="products-toolbar">
            <select id="finance-type-select" class="filter-select">
              <option value="">All Types</option>
              <option value="sales_revenue">Daily Sales</option>
              <option value="capital_in">Capital In</option>
              <option value="owner_draw">Owner Withdrawal</option>
              <option value="opex,capex">Business Expense</option>
            </select>
          </div>

          <!-- Table -->
          <div class="table-wrapper">
            <table class="data-table" id="finance-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Description</th>
                  <th>Amount</th>
                  <th>Notes</th>
                  <th class="actions-col" id="finance-actions-col"></th>
                </tr>
              </thead>
              <tbody id="finance-table-body"></tbody>
            </table>
          </div>

          <div id="finance-pagination" class="pagination"></div>

        </section>

      </main>

    </div>
  </div>

  <!-- Add / Edit Entry Modal -->
  <div class="modal-overlay" id="finance-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="finance-modal-title">Add Entry</h2>
        <button type="button" class="modal-close-button" id="close-finance-modal">×</button>
      </div>

      <form id="finance-form" class="product-form" autocomplete="off">

        <!-- Classification first (Type + Category), then the values. -->
        <div class="form-row">
          <div class="form-group">
            <label for="finance-type">Type</label>
            <select id="finance-type" required>
              <option value="">Select type</option>
              <option value="capital_in">Capital In</option>
              <option value="owner_draw">Withdrawal</option>
            </select>
            <p id="finance-type-error" class="form-error"></p>
          </div>
          <div class="form-group">
            <label for="finance-category">Category</label>
            <select id="finance-category">
              <option value="">Select category</option>
            </select>
            <p id="finance-category-error" class="form-error"></p>
          </div>
        </div>

        <!-- finance-pair: stays 2-col even on mobile (short fields). -->
        <div class="form-row finance-pair">
          <div class="form-group">
            <label for="finance-amount" id="finance-amount-label">Amount (&#8369;)</label>
            <input
              type="number"
              id="finance-amount"
              class="no-spinner"
              placeholder="0.00"
              min="0.01"
              step="0.01"
              required
            />
            <p id="finance-amount-error" class="form-error"></p>
            <p id="finance-amount-hint" class="finance-amount-hint"></p>
          </div>
          <div class="form-group">
            <label for="finance-date">Date</label>
            <input type="date" id="finance-date" required />
            <p id="finance-date-error" class="form-error"></p>
          </div>
        </div>

        <!-- Loan terms — shown only for Capital In + Borrowed. monthly_due x
             term_months is the full amount you'll repay (interest baked in)
             and drives the Debt Balance; the Amount field above stays the cash
             you actually received (principal). -->
        <div id="loan-terms-block" class="loan-terms-block" style="display:none;">
          <div class="form-row finance-pair">
            <div class="form-group">
              <label for="finance-monthly-due">Monthly payment (&#8369;)</label>
              <input type="number" id="finance-monthly-due" class="no-spinner" placeholder="0.00" min="0.01" step="0.01" />
              <p id="finance-monthly-due-error" class="form-error"></p>
            </div>
            <div class="form-group">
              <label for="finance-term-months">Months to pay</label>
              <input type="number" id="finance-term-months" class="no-spinner" placeholder="e.g. 6" min="1" max="120" step="1" />
              <p id="finance-term-months-error" class="form-error"></p>
            </div>
          </div>
          <p id="loan-total-readout" class="loan-total-readout"></p>
        </div>

        <div class="form-group">
          <label for="finance-notes">Notes (optional)</label>
          <input
            type="text"
            id="finance-notes"
            placeholder="e.g. Bayad sa 5-6, kuryente, binili supplies..."
            autocomplete="off"
          />
        </div>

        <div class="modal-actions">
          <button type="submit" class="submit-button" id="finance-submit">Save Entry</button>
        </div>

      </form>
    </div>
  </div>

  <!-- Body-level so it is never clipped by a summary card's overflow:hidden.
       Filled + positioned by finance.js on hover/focus of the Profit info icon. -->
  <div id="profit-info-pop" class="profit-info-pop" role="tooltip" aria-hidden="true"></div>

  <script src="../js/components/sidebar.js?v=8"></script>
  <script src="../js/components/os.client.js?v=8"></script>
  <script src="../js/components/os.widget.js?v=8"></script>
  <script src="../js/components/os.js?v=8"></script>
  <script src="../js/core/theme.js?v=8"></script>
  <script src="../js/core/api.js?v=8"></script>
  <script src="../js/core/utils.js?v=8"></script>
  <script src="../js/core/auth.js?v=8"></script>
  <script src="../js/core/data.js?v=8"></script>
  <script src="../js/onboarding/onboarding.core.js?v=8"></script>
  <script src="../js/onboarding/onboarding.welcome.js?v=8"></script>
  <script src="../js/onboarding/onboarding.checklist.js?v=8"></script>
  <script src="../js/onboarding/onboarding.tours.js?v=8"></script>
  <script src="../js/onboarding/onboarding.tour.js?v=8"></script>
  <script src="../js/pages/finance.js?v=8"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
