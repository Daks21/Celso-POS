<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Celso POS | Finance</title>

  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap"
    rel="stylesheet"
  />
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>

  <link rel="stylesheet" href="../css/main.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/pages/finance.css">
</head>
<body class="app-body">

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="sidebar-header">
        <div class="sidebar-logo-box">
          <i data-lucide="leaf"></i>
        </div>
        <span class="sidebar-app-name nav-link-text">Celso POS</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link" data-page="dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span class="nav-link-text">Dashboard</span>
        </a>
        <a href="order.html" class="nav-link" data-page="order">
          <i data-lucide="shopping-cart"></i>
          <span class="nav-link-text">New Order</span>
        </a>
        <a href="inventory.html" class="nav-link" data-page="inventory">
          <i data-lucide="archive"></i>
          <span class="nav-link-text">Inventory</span>
        </a>
        <a href="products.html" class="nav-link" data-page="products">
          <i data-lucide="package"></i>
          <span class="nav-link-text">Products</span>
        </a>
        <a href="finance.html" class="nav-link" data-page="finance">
          <i data-lucide="wallet"></i>
          <span class="nav-link-text">Finance</span>
        </a>
        <a href="analytics.html" class="nav-link" data-page="analytics">
          <i data-lucide="bar-chart-2"></i>
          <span class="nav-link-text">Analytics</span>
        </a>
        <a href="history.html" class="nav-link" data-page="history">
          <i data-lucide="clock"></i>
          <span class="nav-link-text">History</span>
        </a>
      </nav>

      <div class="sidebar-user-area">

        <div class="user-popup" id="user-popup">
          <a href="account.html" class="user-popup-item">
            <i data-lucide="user"></i>
            Account Settings
          </a>
          <button
            type="button"
            class="user-popup-item logout-item"
            id="logout-button"
          >
            <i data-lucide="log-out"></i>
            Logout
          </button>
        </div>

        <div class="sidebar-user-card" id="user-menu-trigger">
          <div class="user-avatar" id="user-avatar">--</div>
          <div class="user-info">
            <p class="user-name" id="user-name">User</p>
            <p class="user-role">Cashier</p>
          </div>
        </div>

      </div>
    </aside>

    <div class="main-content">

      <!-- Topbar -->
      <header class="topbar">
        <h1 id="page-title">Finance</h1>

        <div class="topbar-actions">
          <button
            type="button"
            class="topbar-icon-button"
            id="theme-toggle"
            title="Toggle theme"
          >
            <i data-lucide="moon" id="theme-icon"></i>
          </button>
        </div>
      </header>

      <main class="page-body">

        <!-- Summary Cards -->
        <div class="finance-summary" id="finance-summary"></div>

        <section class="page-section">

          <div class="products-header">
            <div>
              <h2>Cash Flow</h2>
              <p>Track capital, expenses, and withdrawals</p>
            </div>
            <button type="button" class="submit-button" id="add-entry-button" style="display:none;width:auto;">
              + Add Entry
            </button>
          </div>

          <!-- Filters -->
          <div class="products-toolbar">
            <select id="finance-type-select" class="filter-select">
              <option value="">All Types</option>
              <option value="capital_in">Capital In</option>
              <option value="owner_draw">Withdrawal</option>
              <option value="opex">Operating Expense</option>
              <option value="capex">Investment</option>
            </select>
          </div>

          <!-- Table -->
          <div class="table-wrapper">
            <table class="data-table" id="finance-table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Type</th>
                  <th>Category</th>
                  <th>Amount</th>
                  <th>Notes</th>
                  <th class="actions-col" id="finance-actions-col"></th>
                </tr>
              </thead>
              <tbody id="finance-table-body"></tbody>
            </table>
          </div>

        </section>

      </main>

    </div>
  </div>

  <!-- Add / Edit Entry Modal -->
  <div class="modal-overlay" id="finance-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2 id="finance-modal-title">Add Entry</h2>
        <button type="button" class="modal-close-button" id="close-finance-modal">×</button>
      </div>

      <form id="finance-form" class="product-form" autocomplete="off">

        <div class="form-row" style="margin-bottom:0.75rem;">
          <div class="form-group">
            <label for="finance-type">Type</label>
            <select id="finance-type" required>
              <option value="">Select type</option>
              <option value="capital_in">Capital In</option>
              <option value="owner_draw">Withdrawal</option>
              <option value="opex">Operating Expense</option>
              <option value="capex">Investment</option>
            </select>
            <p id="finance-type-error" class="form-error"></p>
          </div>
          <div class="form-group">
            <label for="finance-date">Date</label>
            <input type="date" id="finance-date" required />
            <p id="finance-date-error" class="form-error"></p>
          </div>
        </div>

        <div class="form-row" style="margin-bottom:0.75rem;">
          <div class="form-group">
            <label for="finance-category">Category</label>
            <select id="finance-category">
              <option value="">Select category</option>
            </select>
            <p id="finance-category-error" class="form-error"></p>
          </div>
          <div class="form-group">
            <label for="finance-amount">Amount (&#8369;)</label>
            <input
              type="number"
              id="finance-amount"
              class="no-spinner"
              placeholder="0.00"
              min="0.01"
              step="0.01"
              required
            />
            <p id="finance-amount-error" class="form-error"></p>
          </div>
        </div>

        <div class="form-group" style="margin-bottom:0.75rem;">
          <label for="finance-notes">Notes (optional)</label>
          <input
            type="text"
            id="finance-notes"
            placeholder="e.g. Bayad sa 5-6, kuryente, binili supplies..."
            autocomplete="off"
          />
        </div>

        <div class="modal-actions">
          <button type="submit" class="submit-button" id="finance-submit">Save Entry</button>
        </div>

      </form>
    </div>
  </div>

  <script src="../js/components/sidebar.js"></script>
  <script src="../js/core/theme.js"></script>
  <script src="../js/core/api.js"></script>
  <script src="../js/core/utils.js"></script>
  <script src="../js/core/auth.js"></script>
  <script src="../js/core/data.js"></script>
  <script src="../js/pages/finance.js"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
