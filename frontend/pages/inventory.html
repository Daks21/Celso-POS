<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Celso POS | Inventory</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235a9e6f'/%3E%3Ctext x='16' y='23' font-family='sans-serif' font-size='20' font-weight='700' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E">
  <script src="../assets/vendor/lucide.min.js?v=13"></script>

  <link rel="stylesheet" href="../css/main.css?v=13">
  <link rel="stylesheet" href="../css/layout.css?v=13">
  <link rel="stylesheet" href="../css/components.css?v=13">
  <link rel="stylesheet" href="../css/pages/inventory.css?v=13">
  <link rel="stylesheet" href="../css/onboarding.css?v=13">
  <link rel="stylesheet" href="../css/os.widget.css?v=13">
</head>
<body class="app-body">

  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">

      <div class="sidebar-header">
        <div class="sidebar-logo-box">
          <i data-lucide="leaf"></i>
        </div>
        <span class="sidebar-app-name nav-link-text">Celso POS</span>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-link" data-page="dashboard">
          <i data-lucide="layout-dashboard"></i>
          <span class="nav-link-text">Dashboard</span>
        </a>
        <a href="order.html" class="nav-link" data-page="order">
          <i data-lucide="shopping-cart"></i>
          <span class="nav-link-text">New Order</span>
        </a>
        <a href="inventory.html" class="nav-link" data-page="inventory">
          <i data-lucide="archive"></i>
          <span class="nav-link-text">Inventory</span>
        </a>
        <a href="products.html" class="nav-link" data-page="products">
          <i data-lucide="package"></i>
          <span class="nav-link-text">Products</span>
        </a>
        <a href="finance.html" class="nav-link" data-page="finance">
          <i data-lucide="wallet"></i>
          <span class="nav-link-text">Finance</span>
        </a>
        <a href="analytics.html" class="nav-link" data-page="analytics">
          <i data-lucide="bar-chart-2"></i>
          <span class="nav-link-text">Analytics</span>
        </a>
        <a href="history.html" class="nav-link" data-page="history">
          <i data-lucide="clock"></i>
          <span class="nav-link-text">History</span>
        </a>
      </nav>

      <div class="sidebar-user-area">

        <div class="user-popup" id="user-popup">
          <a href="account.html" class="user-popup-item">
            <i data-lucide="user"></i>
            Account Settings
          </a>
          <button
            type="button"
            class="user-popup-item logout-item"
            id="logout-button"
          >
            <i data-lucide="log-out"></i>
            Logout
          </button>
        </div>

        <div class="sidebar-user-card" id="user-menu-trigger">
          <div class="user-avatar" id="user-avatar">--</div>
          <div class="user-info">
            <p class="user-name" id="user-name">User</p>
            <p class="user-role">Cashier</p>
          </div>
        </div>

      </div>
    </aside>

    <div class="main-content">

      <!-- Topbar -->
      <header class="topbar">
        <h1 id="page-title">Inventory</h1>

        <div class="topbar-actions">

          <button
            type="button"
            class="topbar-icon-button"
            id="theme-toggle"
            title="Toggle theme"
          >
            <i data-lucide="moon" id="theme-icon"></i>
          </button>


        </div>
      </header>

      <main class="page-body">

        <!-- Summary Cards -->
        <div class="summary-cards" id="inventory-summary">
          <!-- Rendered by JS -->
        </div>

        <section class="page-section">

          <div class="products-header">
            <div>
              <h2>Inventory</h2>
              <p>Monitor stock levels and restock products</p>
            </div>
            <div class="inventory-header-actions" id="admin-restock-header">
              <a href="products.html" class="secondary-button inventory-new-product">
                <i data-lucide="plus"></i>
                <span>New product</span>
              </a>
            </div>
          </div>

          <!-- Filter -->
          <div class="products-toolbar">
            <div class="search-field">
              <input
                type="text"
                id="inventory-search"
                class="search-input"
                placeholder="Search products..."
                autocomplete="off"
              />
              <!-- Tap to clear on touch; ESC clears via keyboard. Hidden until typed. -->
              <button
                type="button"
                class="search-clear"
                id="inventory-search-clear"
                aria-label="Clear search"
                hidden
              >
                <i data-lucide="x"></i>
              </button>
            </div>
            <select id="inventory-category-select" class="filter-select">
              <!-- Options rendered by JS -->
            </select>
            <select id="inventory-status-select" class="filter-select">
              <option value="all">All Status</option>
              <option value="ok">In Stock</option>
              <option value="low">Low Stock</option>
              <option value="out">Out of Stock</option>
            </select>
          </div>

          <!-- Table -->
          <div class="table-wrapper">
            <table class="data-table" id="inventory-table">
              <thead>
                <tr>
                  <th>Product Name</th>
                  <th>Category</th>
                  <th>Current Stock</th>
                  <th></th>
                  <th id="restock-col-header"></th>
                </tr>
              </thead>
              <tbody id="inventory-table-body">
                <!-- Rendered by JS -->
              </tbody>
            </table>
          </div>

          <div id="inventory-pagination" class="pagination"></div>

        </section>

      </main>

    </div>
  </div>

  <!-- Restock Modal (Admin Only) -->
  <div class="modal-overlay" id="restock-modal">
    <div class="modal-card">
      <div class="modal-header">
        <h2>Restock Product</h2>
        <button type="button" class="modal-close-button"
                id="close-restock-modal">×</button>
      </div>
      <div id="restock-product-info" class="restock-product-info">
        <!-- Rendered by JS -->
      </div>
      <div class="form-group" style="margin-top: 1rem;">
        <label for="restock-quantity">Quantity to Add</label>
        <input
          type="number"
          id="restock-quantity"
          class="search-input no-spinner"
          placeholder="Enter quantity"
          min="1"
          step="1"
        />
        <p id="restock-error" class="form-error"></p>
      </div>

      <button type="button" class="submit-button" id="confirm-restock">Add Stock</button>

    </div>
  </div>

  <script src="../js/components/sidebar.js?v=13"></script>
  <script src="../js/components/os.client.js?v=13"></script>
  <script src="../js/components/os.widget.js?v=13"></script>
  <script src="../js/components/os.js?v=13"></script>
  <script src="../js/core/theme.js?v=13"></script>
  <script src="../js/core/api.js?v=13"></script>
  <script src="../js/components/billing.modal.js?v=13"></script>
  <script src="../js/components/locked.overlay.js?v=13"></script>
  <script src="../js/core/utils.js?v=13"></script>
  <script src="../js/core/auth.js?v=13"></script>
  <script src="../js/core/data.js?v=13"></script>
  <script src="../js/onboarding/onboarding.core.js?v=13"></script>
  <script src="../js/onboarding/onboarding.welcome.js?v=13"></script>
  <script src="../js/onboarding/onboarding.checklist.js?v=13"></script>
  <script src="../js/onboarding/onboarding.tours.js?v=13"></script>
  <script src="../js/onboarding/onboarding.tour.js?v=13"></script>
  <script src="../js/pages/inventory.js?v=13"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
