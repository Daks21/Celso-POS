<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celso POS | Set your password</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235a9e6f'/%3E%3Ctext x='16' y='23' font-family='sans-serif' font-size='20' font-weight='700' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="../css/main.css?v=18">
  <style>
    .cp-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--color-background)}
    .cp-card{width:100%;max-width:380px;background:var(--color-surface);border:1px solid var(--color-border);border-radius:var(--radius-lg,16px);padding:28px;box-shadow:var(--shadow-md)}
    .cp-card h1{font-size:20px;margin:0 0 6px;color:var(--color-text)}
    .cp-card p.cp-lead{font-size:14px;color:var(--color-text-muted);margin:0 0 20px}
    .cp-field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .cp-field label{font-size:13px;font-weight:600;color:var(--color-text)}
    .cp-field input{padding:11px 12px;border:1px solid var(--color-border);border-radius:var(--radius-sm,8px);font-family:inherit;font-size:14px;background:var(--color-surface);color:var(--color-text)}
    .cp-field input:focus{outline:2px solid var(--color-primary);outline-offset:-1px;border-color:transparent}
    .cp-btn{width:100%;padding:12px;border:none;border-radius:var(--radius-sm,8px);background:var(--color-primary);color:#fff;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;margin-top:4px}
    .cp-btn:disabled{opacity:.6;cursor:not-allowed}
    .cp-error{color:var(--color-error);font-size:13px;min-height:18px;margin-top:10px}
  </style>
  <script src="../js/core/lite-mode.js?v=18"></script>
</head>
<body>
  <div class="cp-wrap">
    <div class="cp-card">
      <h1>Set your password</h1>
      <p class="cp-lead">Choose a password only you know — this replaces the temporary one your store owner gave you.</p>
      <form id="cp-form" autocomplete="off">
        <div class="cp-field">
          <label for="cp-new">New password</label>
          <input type="password" id="cp-new" minlength="12" placeholder="At least 12 characters" required>
          <div class="pw-meter" id="pw-meter" aria-hidden="true">
            <div class="pw-meter-track"><div class="pw-meter-fill"></div></div>
            <span class="pw-meter-label"></span>
          </div>
        </div>
        <div class="cp-field">
          <label for="cp-confirm">Confirm password</label>
          <input type="password" id="cp-confirm" minlength="12" placeholder="Re-enter your password" required>
        </div>
        <button type="submit" class="cp-btn" id="cp-btn">Save and continue</button>
        <div class="cp-error" id="cp-error"></div>
      </form>
    </div>
  </div>

  <script defer src="../js/core/api.js?v=18"></script>
  <script defer src="../js/core/utils.js?v=18"></script>
  <script defer src="../js/core/auth.js?v=18"></script>
  <script defer src="../js/core/password-policy.js?v=18"></script>
  <script defer src="../js/pages/change-password.js?v=18"></script>
</body>
</html>
