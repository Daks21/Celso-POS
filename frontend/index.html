<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    (function () {
      var theme = localStorage.getItem('theme') || 'light';
      if (theme === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Celso POS | Login</title>

  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%235a9e6f'/%3E%3Ctext x='16' y='23' font-family='sans-serif' font-size='20' font-weight='700' text-anchor='middle' fill='white'%3EC%3C/text%3E%3C/svg%3E">
  <script src="assets/vendor/icons.js?v=25"></script>

  <link rel="stylesheet" href="css/main.css?v=25">
  <script src="js/core/lite-mode.js?v=25"></script>
</head>
<body>

  <main class="page-wrapper">

    <section class="login-container">

      <div class="app-branding">
        <div class="logo-area">
          <i data-lucide="leaf"></i>
        </div>
        <p>Simple and reliable point-of-sale system</p>
      </div>

      <div class="login-card">
        <h2>Welcome Back</h2>
        <p class="login-subtitle">Log in to continue managing your store</p>

        <form class="login-form" id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email Address</label>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Enter your email"
              required
            />
            <p id="email-error" class="form-error"></p>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Enter your password"
              required
            />
            <p id="password-error" class="form-error"></p>
          </div>

          <p id="login-error" class="form-error"></p>

          <button type="submit" class="submit-button">
            Login
          </button>
        </form>

        <p class="register-link">
          Don't have an account?
          <a href="pages/auth/register.html">Create an account</a>
        </p>
      </div>
    </section>

  </main>

  <script defer src="js/core/api.js?v=25"></script>
  <script defer src="js/core/utils.js?v=25"></script>
  <script defer src="js/core/auth.js?v=25"></script>
  <script>lucide.createIcons();</script>
</body>
</html>
